apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual
  namespace: actual
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: actual
  template:
    metadata:
      labels:
        app: actual
    spec:
      containers:
        - name: actual
          image: actualbudget/actual-server:latest-alpine
          ports:
            - containerPort: 5006
          env:
            - name: ACTUAL_PORT
              value: "5006"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actual-data
