apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syncthing-backups-restic
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/Sanlys/kubernetes.git
    targetRevision: main
    path: cluster/prod/platform/syncthing-backups-restic
    directory:
      exclude: "{app.yaml,secret.enc.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: syncthing
  syncPolicy:
    automated: { prune: true, selfHeal: true }
